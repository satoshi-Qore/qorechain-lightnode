name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: CGO_ENABLED=1 go vet ./internal/config/... ./internal/db/... ./internal/client/...
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib/linux_amd64

      - name: Build SX
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/lightnode-sx/
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib/linux_amd64

      - name: Build UX
        run: CGO_ENABLED=1 go build -o /dev/null ./cmd/lightnode-ux/
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib/linux_amd64

      - name: Test
        run: CGO_ENABLED=1 go test ./...
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/lib/linux_amd64

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files need formatting:"
            gofmt -l .
            exit 1
          fi
